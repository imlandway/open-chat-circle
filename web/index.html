<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Chat Circle</title>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside id="nav-rail" class="nav-rail hidden">
        <button id="nav-mine-btn" class="nav-avatar-btn" type="button" aria-label="我的"></button>

        <div class="nav-shortcuts">
          <button class="nav-btn" data-nav-section="contacts" type="button">联系人</button>
          <button class="nav-btn" data-nav-section="conversations" type="button">会话</button>
        </div>

        <button id="nav-admin-btn" class="nav-btn hidden" data-nav-section="admin" type="button">全部账号</button>
        <button id="logout-btn" class="nav-logout hidden" type="button">退出</button>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-copy">
            <h2 id="topbar-title">登录</h2>
            <p id="connection-status" class="connection-status">未连接</p>
          </div>
          <button id="create-group-btn" class="ghost-btn hidden" type="button">新建群聊</button>
        </header>

        <section class="content">
          <div class="sidebar-column">
            <section id="auth-panel" class="panel"></section>

            <section id="user-panel" class="panel hidden">
              <div id="user-summary"></div>
            </section>

            <section id="contacts-panel" class="panel hidden">
              <div class="panel-header">
                <h3>联系人</h3>
                <div class="inline-actions">
                  <button id="add-friend-btn" class="ghost-btn" type="button">加好友</button>
                  <button id="refresh-contacts-btn" class="ghost-btn" type="button">刷新</button>
                </div>
              </div>
              <div id="contacts-list" class="list"></div>
            </section>

            <section id="conversations-panel" class="panel hidden">
              <div id="conversation-list" class="list"></div>
            </section>

            <section id="admin-panel" class="panel hidden">
              <div class="panel-header">
                <h3>全部账号</h3>
                <button id="create-invite-btn" class="ghost-btn" type="button">生成邀请码</button>
              </div>
              <div id="admin-user-list" class="list"></div>
              <div class="panel-header sub-panel-header">
                <h3>邀请码</h3>
              </div>
              <div id="invite-list" class="list"></div>
            </section>
          </div>

          <div class="chat-column">
            <div id="empty-state" class="empty-state">
              <h3>请选择一个会话</h3>
              <p>你可以从联系人发起聊天，或切到会话列表继续聊天。</p>
            </div>

            <div id="chat-panel" class="chat-panel hidden">
              <div class="chat-header">
                <div class="chat-title-wrap">
                  <div id="chat-avatar"></div>
                  <div>
                    <h3 id="chat-title">会话</h3>
                    <p id="chat-meta"></p>
                  </div>
                </div>
              </div>

              <div id="message-list" class="message-list"></div>

              <form id="message-form" class="composer">
                <div id="reply-preview" class="reply-preview hidden"></div>
                <input id="message-input" type="text" placeholder="输入消息" autocomplete="off" />
                <label class="file-btn" for="image-input">
                  图片
                  <input id="image-input" type="file" accept="image/*" hidden />
                </label>
                <button type="submit" class="primary-btn">发送</button>
              </form>
            </div>
          </div>
        </section>
      </main>
    </div>

    <dialog id="group-dialog">
      <form method="dialog" id="group-form" class="dialog-form">
        <div class="panel-header">
          <h3>创建群聊</h3>
          <button class="ghost-btn" type="button" id="close-group-btn">关闭</button>
        </div>
        <label class="stack">
          <span>群聊名称</span>
          <input id="group-name-input" type="text" required />
        </label>
        <div class="stack">
          <span>选择成员</span>
          <div id="group-member-list" class="list compact-list"></div>
        </div>
        <button type="submit" class="primary-btn">创建</button>
      </form>
    </dialog>

    <dialog id="avatar-dialog">
      <div class="dialog-form">
        <div class="panel-header">
          <h3 id="avatar-dialog-title">裁剪头像</h3>
          <button class="ghost-btn" type="button" id="close-avatar-btn">取消</button>
        </div>

        <div class="avatar-crop-layout">
          <div class="avatar-crop-stage" id="avatar-crop-stage" aria-label="头像裁剪区域">
            <img id="avatar-crop-image" class="avatar-crop-image" alt="头像裁剪预览" draggable="false" />
            <div class="avatar-crop-mask"></div>
            <div class="avatar-crop-frame"></div>
          </div>
        </div>

        <div class="dialog-actions">
          <button type="button" class="primary-btn" id="save-avatar-btn">保存头像</button>
        </div>
      </div>
    </dialog>

    <dialog id="avatar-view-dialog">
      <div class="avatar-viewer">
        <button class="ghost-btn avatar-viewer-close" type="button" id="close-avatar-view-btn">关闭</button>
        <img id="avatar-view-image" class="avatar-view-image" alt="头像预览" />
      </div>
    </dialog>

    <dialog id="add-friend-dialog">
      <div class="dialog-form">
        <div class="panel-header">
          <h3>添加好友</h3>
          <button class="ghost-btn" type="button" id="close-add-friend-btn">关闭</button>
        </div>
        <form id="add-friend-form" class="stack">
          <label class="field">
            <span>账号或昵称</span>
            <input id="friend-search-input" name="query" type="text" placeholder="输入账号或昵称搜索" />
          </label>
          <button class="primary-btn" type="submit">搜索</button>
        </form>
        <div id="discover-user-list" class="list compact-list"></div>
      </div>
    </dialog>

    <dialog id="group-profile-dialog">
      <div class="dialog-form">
        <div class="panel-header">
          <h3 id="group-profile-title">群主页</h3>
          <button class="ghost-btn" type="button" id="close-group-profile-btn">关闭</button>
        </div>
        <div id="group-profile-meta" class="stack"></div>
        <div class="stack">
          <div class="panel-header">
            <h3>群成员</h3>
          </div>
          <div id="group-member-manage-list" class="list compact-list"></div>
        </div>
        <div id="group-member-add-panel" class="stack hidden">
          <div class="panel-header">
            <h3>拉人进群</h3>
          </div>
          <label class="field" hidden>
            <span>搜索好友</span>
            <input
              id="group-member-search-input"
              type="text"
              placeholder="输入好友昵称或账号"
              autocomplete="off"
            />
          </label>
          <div class="stack" hidden>
            <span>已选择</span>
            <div id="group-selected-member-list" class="group-member-chip-list"></div>
          </div>
          <div id="group-addable-member-list" class="list compact-list"></div>
          <button id="submit-add-group-members-btn" class="primary-btn" type="button" hidden>确认拉人</button>
        </div>
      </div>
    </dialog>

    <input id="group-avatar-input" type="file" accept="image/*" hidden />
    <div id="toast" class="toast hidden"></div>
    <div id="message-context-menu" class="message-context-menu hidden"></div>
    <script src="/app/app.js" type="module"></script>
  </body>
</html>
