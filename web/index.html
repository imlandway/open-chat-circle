<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Chat Circle</title>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>Open Chat Circle</h1>
          <p>开放 API 的朋友聊天空间</p>
        </div>

        <section id="auth-panel" class="panel"></section>

        <section id="user-panel" class="panel hidden">
          <div class="panel-header">
            <h2>当前用户</h2>
            <button id="logout-btn" class="ghost-btn" type="button">退出登录</button>
          </div>
          <div id="user-summary"></div>
        </section>

        <section id="contacts-panel" class="panel hidden">
          <div class="panel-header">
            <h2>联系人</h2>
            <button id="refresh-contacts-btn" class="ghost-btn" type="button">刷新</button>
          </div>
          <div id="contacts-list" class="list"></div>
        </section>

        <section id="admin-panel" class="panel hidden">
          <div class="panel-header">
            <h2>邀请码</h2>
            <button id="create-invite-btn" class="ghost-btn" type="button">生成</button>
          </div>
          <div id="invite-list" class="list"></div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2>会话</h2>
            <p id="connection-status">未连接</p>
          </div>
          <button id="create-group-btn" class="primary-btn hidden" type="button">创建群聊</button>
        </header>

        <section class="content">
          <div class="column conversations-column">
            <div id="conversation-list" class="list"></div>
          </div>

          <div class="column chat-column">
            <div id="empty-state" class="empty-state">
              <h3>先选择一个会话</h3>
              <p>你可以从联系人里发起聊天，或者创建一个群聊。</p>
            </div>

            <div id="chat-panel" class="chat-panel hidden">
              <div class="chat-header">
                <div class="chat-title-wrap">
                  <div id="chat-avatar"></div>
                  <div>
                    <h3 id="chat-title">会话</h3>
                    <p id="chat-meta"></p>
                  </div>
                </div>
              </div>

              <div id="message-list" class="message-list"></div>

              <form id="message-form" class="composer">
                <input id="message-input" type="text" placeholder="输入消息" autocomplete="off" />
                <label class="file-btn" for="image-input">
                  图片
                  <input id="image-input" type="file" accept="image/*" hidden />
                </label>
                <button type="submit" class="primary-btn">发送</button>
              </form>
            </div>
          </div>
        </section>
      </main>
    </div>

    <dialog id="group-dialog">
      <form method="dialog" id="group-form" class="dialog-form">
        <div class="panel-header">
          <h3>创建群聊</h3>
          <button class="ghost-btn" type="button" id="close-group-btn">关闭</button>
        </div>
        <label class="stack">
          <span>群名称</span>
          <input id="group-name-input" type="text" required />
        </label>
        <div class="stack">
          <span>选择成员</span>
          <div id="group-member-list" class="list compact-list"></div>
        </div>
        <button type="submit" class="primary-btn">创建群聊</button>
      </form>
    </dialog>

    <dialog id="avatar-dialog">
      <div class="dialog-form">
        <div class="panel-header">
          <h3>裁剪头像</h3>
          <button class="ghost-btn" type="button" id="close-avatar-btn">关闭</button>
        </div>
        <div class="avatar-crop-layout">
          <div class="avatar-crop-stage">
            <canvas id="avatar-crop-canvas" width="280" height="280"></canvas>
          </div>
          <div class="stack">
            <label class="stack">
              <span>缩放</span>
              <input id="avatar-zoom-input" type="range" min="1" max="3" step="0.01" value="1" />
            </label>
            <label class="stack">
              <span>左右位置</span>
              <input id="avatar-offset-x-input" type="range" min="-100" max="100" step="1" value="0" />
            </label>
            <label class="stack">
              <span>上下位置</span>
              <input id="avatar-offset-y-input" type="range" min="-100" max="100" step="1" value="0" />
            </label>
            <p class="meta">拖动滑块调整头像范围，保存后会自动生成方形头像。</p>
          </div>
        </div>
        <button type="button" class="primary-btn" id="save-avatar-btn">保存头像</button>
      </div>
    </dialog>

    <div id="toast" class="toast hidden"></div>
    <script src="/app/app.js" type="module"></script>
  </body>
</html>
